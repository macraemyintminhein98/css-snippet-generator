<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Snippet Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; }
        .preview { min-height: 100px; border: 1px solid #ccc; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-2xl w-full">
        <h1 class="text-3xl font-bold mb-6 text-center">CSS Snippet Generator</h1>
        
        <div class="mb-6">
            <label for="snippetType" class="block text-gray-700 text-sm font-bold mb-2">Select Snippet:</label>
            <select id="snippetType" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                <option value="box-shadow">Box Shadow</option>
                <option value="gradient">Linear Gradient</option>
                <option value="button">Button Style</option>
            </select>
        </div>

        <div id="controls" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"></div>

        <div class="mb-6">
            <h2 class="text-xl font-semibold mb-2">Preview:</h2>
            <div id="livePreview" class="preview rounded p-4 flex items-center justify-center"></div>
        </div>

        <div class="mb-6">
            <h2 class="text-xl font-semibold mb-2">Generated CSS:</h2>
            <textarea id="cssOutput" class="w-full p-3 border rounded bg-gray-50 font-mono text-sm" rows="6" readonly></textarea>
        </div>

        <button id="copyBtn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full focus:outline-none focus:shadow-outline">
            Copy to Clipboard
        </button>

        <div class="text-center mt-6">
            <button id="buyNowBtn" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-full text-lg shadow-lg">
                Buy Now ($9.99)
            </button>
        </div>
    </div>

    <script>
        // This script will be significantly expanded in a real Next.js app.
        // It demonstrates basic functionality and structure.
        
        const snippetType = document.getElementById('snippetType');
        const controlsDiv = document.getElementById('controls');
        const livePreview = document.getElementById('livePreview');
        const cssOutput = document.getElementById('cssOutput');
        const copyBtn = document.getElementById('copyBtn');
        const buyNowBtn = document.getElementById('buyNowBtn');

        const generateBoxShadow = (h, v, b, s, c) => `box-shadow: ${h}px ${v}px ${b}px ${s}px ${c};`;
        const generateGradient = (c1, c2, dir) => `background: linear-gradient(${dir}deg, ${c1}, ${c2});`;
        const generateButton = (bg, tc, pX, pY, br) => `background-color: ${bg}; color: ${tc}; padding: ${pY}px ${pX}px; border-radius: ${br}px; border: none; cursor: pointer;`;

        const updateSnippet = () => {
            const type = snippetType.value;
            let css = '';
            livePreview.style = ''; // Reset CSS

            switch (type) {
                case 'box-shadow':
                    const hs = document.getElementById('shadowH').value;
                    const vs = document.getElementById('shadowV').value;
                    const bs = document.getElementById('shadowB').value;
                    const ss = document.getElementById('shadowS').value;
                    const cs = document.getElementById('shadowC').value;
                    css = generateBoxShadow(hs, vs, bs, ss, cs);
                    livePreview.style.boxShadow = `${hs}px ${vs}px ${bs}px ${ss}px ${cs}`;
                    livePreview.textContent = ''; // Clear text for shadow
                    break;
                case 'gradient':
                    const c1 = document.getElementById('gradC1').value;
                    const c2 = document.getElementById('gradC2').value;
                    const dir = document.getElementById('gradDir').value;
                    css = generateGradient(c1, c2, dir);
                    livePreview.style.background = `linear-gradient(${dir}deg, ${c1}, ${c2})`;
                    livePreview.textContent = ''; // Clear text for gradient
                    break;
                case 'button':
                    const bg = document.getElementById('btnBG').value;
                    const tc = document.getElementById('btnTC').value;
                    const pX = document.getElementById('btnPX').value;
                    const pY = document.getElementById('btnPY').value;
                    const br = document.getElementById('btnBR').value;
                    css = generateButton(bg, tc, pX, pY, br);
                    livePreview.style.backgroundColor = bg;
                    livePreview.style.color = tc;
                    livePreview.style.padding = `${pY}px ${pX}px`;
                    livePreview.style.borderRadius = `${br}px`;
                    livePreview.style.border = 'none';
                    livePreview.style.cursor = 'pointer';
                    livePreview.textContent = 'Click Me';
                    break;
            }
            cssOutput.value = css;
        };

        const loadControls = () => {
            const type = snippetType.value;
            controlsDiv.innerHTML = '';
            let html = '';

            const addInput = (id, label, type, value, step) => `
                <div class="mb-4">
                    <label for="${id}" class="block text-gray-700 text-sm font-bold mb-2">${label}:</label>
                    <input type="${type}" id="${id}" value="${value}" ${step ? `step="${step}"` : ''} 
                           class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
            `;

            switch (type) {
                case 'box-shadow':
                    html += addInput('shadowH', 'Horizontal Offset (px)', 'range', '5', '1');
                    html += addInput('shadowV', 'Vertical Offset (px)', 'range', '5', '1');
                    html += addInput('shadowB', 'Blur Radius (px)', 'range', '10', '1');
                    html += addInput('shadowS', 'Spread Radius (px)', 'range', '0', '1');
                    html += addInput('shadowC', 'Color', 'color', '#000000');
                    break;
                case 'gradient':
                    html += addInput('gradC1', 'Color 1', 'color', '#FF0000');
                    html += addInput('gradC2', 'Color 2', 'color', '#0000FF');
                    html += addInput('gradDir', 'Direction (deg)', 'range', '90', '1');
                    break;
                case 'button':
                    html += addInput('btnBG', 'Background Color', 'color', '#4CAF50');
                    html += addInput('btnTC', 'Text Color', 'color', '#FFFFFF');
                    html += addInput('btnPX', 'Padding X (px)', 'range', '20', '1');
                    html += addInput('btnPY', 'Padding Y (px)', 'range', '10', '1');
                    html += addInput('btnBR', 'Border Radius (px)', 'range', '5', '1');
                    break;
            }
            controlsDiv.innerHTML = html;
            controlsDiv.querySelectorAll('input').forEach(input => input.addEventListener('input', updateSnippet));
            updateSnippet();
        };

        snippetType.addEventListener('change', loadControls);
        copyBtn.addEventListener('click', () => {
            cssOutput.select();
            document.execCommand('copy');
            alert('CSS copied to clipboard!');
        });

        buyNowBtn.addEventListener('click', () => {
            alert('Redirecting to Stripe Checkout for purchase ($9.99)... (Not implemented in this HTML, but this is where it would go)');
            // In a real app, this would initiate a Stripe Checkout session.
        });

        loadControls(); // Initial load
    </script>
</body>
</html>
